<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RFID 智能安防管控平台</title>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
<script src="https://unpkg.com/@element-plus/icons-vue"></script>
<script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
<script src="https://unpkg.com/echarts@5/dist/echarts.min.js"></script>
<style>
:root{--el-color-primary:#818cf8;--el-menu-bg-color:#0f0f1a;--el-menu-text-color:#94a3b8;--el-menu-hover-bg-color:rgba(129,140,248,.08);
  --glass-bg:rgba(15,15,26,.7);--glass-border:rgba(255,255,255,.06);--glass-hover:rgba(255,255,255,.04);
  --text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;
  --accent-1:#818cf8;--accent-2:#22d3ee;--accent-3:#34d399;--accent-4:#fbbf24;--accent-5:#f472b6;--danger:#ef4444;
  --radius-sm:10px;--radius-md:16px;--radius-lg:24px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);--shadow-md:0 8px 32px rgba(0,0,0,.4);--shadow-glow:0 0 40px rgba(129,140,248,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#06060f;
  color:var(--text-primary);
  font-family:"Inter",-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* ---- Animated Background ---- */
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%, rgba(129,140,248,.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 100%, rgba(34,211,238,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 30%, rgba(244,114,182,.04) 0%, transparent 50%),
    #06060f;
}
body::after{
  content:'';position:fixed;inset:0;z-index:-1;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='g' width='60' height='60' patternUnits='userSpaceOnUse'%3E%3Ccircle cx='30' cy='30' r='.5' fill='rgba(255,255,255,.03)'/%3E%3C/pattern%3E%3C/defs%3E%3Crect fill='url(%23g)' width='100%25' height='100%25'/%3E%3C/svg%3E");
  opacity:.6;pointer-events:none;
}
/* ---- Layout ---- */
.el-container{min-height:100vh}
.el-aside{
  background:var(--glass-bg);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-right:1px solid var(--glass-border);overflow:hidden;z-index:10;
}
.el-menu{background:transparent;border-right:none;padding:.5rem 0}
.el-menu-item,.el-sub-menu__title{
  color:var(--text-secondary);font-size:13.5px;font-weight:500;
  margin:2px 12px;border-radius:10px;padding:10px 14px!important;
  transition:all .25s cubic-bezier(.4,0,.2,1);height:auto!important;line-height:1.5!important;
}
.el-menu-item:hover{background:var(--glass-hover)!important;color:var(--text-primary);transform:translateX(3px)}
.el-menu-item.is-active{
  background:linear-gradient(135deg,rgba(129,140,248,.15),rgba(34,211,238,.08))!important;
  color:#fff!important;border-left:none!important;font-weight:600;
  box-shadow:inset 0 0 0 1px rgba(129,140,248,.2);
}
.logo{font-size:1.3rem;font-weight:800;padding:1.5rem 1.2rem 1rem;color:#fff;display:flex;align-items:center;gap:.35rem;letter-spacing:-.02em}
.logo span{background:linear-gradient(135deg,var(--accent-1),var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
/* ---- Cards ---- */
.glass-card{
  background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:var(--radius-md);
  padding:1.5rem;transition:all .35s cubic-bezier(.4,0,.2,1);
}
.glass-card:hover{border-color:rgba(129,140,248,.25);box-shadow:var(--shadow-glow);transform:translateY(-2px)}
.glass-card.interactive{cursor:pointer}
.glass-card.interactive:active{transform:scale(.98)}
.bento-grid{display:grid;gap:1rem}
.stat-card{
  background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:var(--radius-md);
  padding:1.5rem;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent-1),transparent);opacity:0;transition:opacity .3s;
}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.stat-card:hover::before{opacity:1}
.stat-value{font-size:2.4rem;font-weight:800;letter-spacing:-.02em;line-height:1}
.stat-label{color:var(--text-muted);font-size:.82rem;margin-top:.4rem;font-weight:500}
.env-card{
  text-align:center;padding:1.8rem 1rem;border-radius:var(--radius-md);
  border:1px solid var(--glass-border);
  background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:all .3s;position:relative;overflow:hidden;
}
.env-card::after{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse at center,var(--accent-1) 0%,transparent 100%);opacity:0;transition:opacity .3s}
.env-card:hover::after{opacity:.04}
.env-card:hover{border-color:rgba(129,140,248,.3);transform:translateY(-2px)}
.env-val{font-size:2.2rem;font-weight:800;letter-spacing:-.02em;position:relative;z-index:1}
.env-lbl{color:var(--text-muted);font-size:.82rem;margin-top:.4rem;position:relative;z-index:1}
/* ---- Animations ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(129,140,248,.4)}100%{box-shadow:0 0 0 12px rgba(129,140,248,0)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes alarmFlash{0%,100%{border-color:var(--glass-border)}50%{border-color:var(--danger);box-shadow:0 0 24px rgba(239,68,68,.25)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.fade-up{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.fade-up-1{animation-delay:.05s}
.fade-up-2{animation-delay:.1s}
.fade-up-3{animation-delay:.15s}
.fade-up-4{animation-delay:.2s}
.alarm-flash{animation:alarmFlash 1.2s infinite}
.alive-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--accent-3);animation:pulse-ring 2s infinite;margin-right:6px}
/* ---- Gradient Text ---- */
.gradient-text{
  background:linear-gradient(135deg,var(--accent-1),var(--accent-2),var(--accent-5));
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:gradientShift 4s ease infinite;
}
/* ---- Login ---- */
.login-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.login-page::before{
  content:'';position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(129,140,248,.12),transparent 70%);
  top:-200px;left:-100px;animation:float 8s ease-in-out infinite;
}
.login-page::after{
  content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(34,211,238,.1),transparent 70%);
  bottom:-150px;right:-100px;animation:float 10s ease-in-out infinite reverse;
}
.login-card{
  width:440px;padding:2.8rem;border-radius:var(--radius-lg);
  background:var(--glass-bg);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1px solid var(--glass-border);
  box-shadow:var(--shadow-md),0 0 80px rgba(129,140,248,.06);
  position:relative;z-index:1;
}
/* ---- Insight Cards ---- */
.insight-card{
  border-radius:var(--radius-md);padding:1.2rem 1.5rem;margin-bottom:.8rem;
  border:1px solid;backdrop-filter:blur(8px);transition:all .3s;
}
.insight-card:hover{transform:translateX(4px)}
.insight-danger{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2)}
.insight-warning{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2)}
.insight-info{background:rgba(6,182,212,.08);border-color:rgba(6,182,212,.2)}
.insight-good{background:rgba(34,211,153,.08);border-color:rgba(34,211,153,.2)}
/* ---- Header ---- */
.el-header{
  padding:1rem 1.8rem;background:var(--glass-bg);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;z-index:5;
}
.el-main{background:transparent;padding:1.8rem}
.el-breadcrumb__item span{color:var(--text-muted)!important;font-size:13px}
.el-breadcrumb__item:last-child span{color:var(--text-primary)!important}
/* ---- Element Plus Overrides ---- */
.el-button--primary{--el-button-bg-color:var(--accent-1);--el-button-border-color:transparent;--el-button-hover-bg-color:#9ca3f8;--el-button-hover-border-color:transparent;font-weight:600;letter-spacing:.01em}
.el-button{transition:all .25s cubic-bezier(.4,0,.2,1)}
.el-button:hover{transform:translateY(-1px)}
.el-dialog{
  background:var(--glass-bg)!important;backdrop-filter:blur(32px)!important;-webkit-backdrop-filter:blur(32px)!important;
  border:1px solid var(--glass-border)!important;border-radius:var(--radius-lg)!important;box-shadow:var(--shadow-md)!important;
}
.el-dialog__header{color:var(--text-primary)!important;border-bottom:1px solid var(--glass-border);padding-bottom:.8rem}
.el-input__wrapper{background:rgba(255,255,255,.04)!important;border:1px solid var(--glass-border)!important;box-shadow:none!important;border-radius:var(--radius-sm)!important;transition:all .3s!important}
.el-input__wrapper:hover{border-color:rgba(129,140,248,.3)!important}
.el-input__wrapper.is-focus{border-color:var(--accent-1)!important;box-shadow:0 0 0 3px rgba(129,140,248,.15)!important}
.el-input__inner{color:var(--text-primary)!important}
.el-input__inner::placeholder{color:var(--text-muted)!important}
.el-table{
  --el-table-bg-color:transparent;--el-table-tr-bg-color:transparent;
  --el-table-header-bg-color:rgba(15,15,26,.6);--el-table-border-color:var(--glass-border);
  --el-table-text-color:var(--text-primary);--el-table-header-text-color:var(--text-muted);
  --el-table-row-hover-bg-color:rgba(129,140,248,.04);
}
.el-table th.el-table__cell{font-weight:500;font-size:.82rem;letter-spacing:.02em;text-transform:uppercase;border-bottom:1px solid var(--glass-border)}
.el-table td.el-table__cell{border-bottom:1px solid rgba(255,255,255,.03);font-size:.9rem}
.el-table::before{display:none}
.el-tag{border-radius:20px!important;font-weight:500!important;letter-spacing:.01em}
.el-tabs__header{background:transparent!important;border-bottom:1px solid var(--glass-border)!important}
.el-tabs__item{color:var(--text-secondary)!important;font-weight:500!important;font-size:.9rem!important}
.el-tabs__item.is-active{color:var(--accent-1)!important}
.el-tabs__active-bar{background:var(--accent-1)!important;height:2px!important;border-radius:2px!important}
.el-message-box{background:var(--glass-bg)!important;backdrop-filter:blur(32px)!important;border:1px solid var(--glass-border)!important;border-radius:var(--radius-md)!important}
.el-message-box__title{color:var(--text-primary)!important}
.el-message-box__message{color:var(--text-secondary)!important}
.el-select-dropdown{background:rgba(15,15,26,.95)!important;backdrop-filter:blur(16px)!important;border:1px solid var(--glass-border)!important;border-radius:var(--radius-sm)!important}
.el-select-dropdown__item{color:var(--text-secondary)!important}
.el-select-dropdown__item.is-hovering,.el-select-dropdown__item:hover{background:var(--glass-hover)!important;color:var(--text-primary)!important}
.el-popper.is-dark{background:rgba(15,15,26,.95)!important;backdrop-filter:blur(16px)!important;border:1px solid var(--glass-border)!important}
.el-radio-button__inner{border-radius:var(--radius-sm)!important}
.el-empty__description p{color:var(--text-muted)!important}
/* ---- Misc ---- */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}
.summary-bar{border-radius:var(--radius-md);padding:1.2rem 1.5rem;font-size:1.05rem;font-weight:600;text-align:center;margin-bottom:1.5rem;backdrop-filter:blur(8px)}
.summary-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.summary-warning{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);color:#fcd34d}
.summary-good{background:rgba(34,211,153,.12);border:1px solid rgba(34,211,153,.25);color:#86efac}
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shimmer 2s infinite;border-radius:8px}
.page-grid{display:grid;gap:1rem}.page-grid.cols-4{grid-template-columns:repeat(4,1fr)}.page-grid.cols-2{grid-template-columns:repeat(2,1fr)}.page-grid.cols-12{grid-template-columns:repeat(12,1fr)}.page-grid .s2{grid-column:span 2}.page-grid .s3{grid-column:span 3}.page-grid .s4{grid-column:span 4}.page-grid .s5{grid-column:span 5}.page-grid .s6{grid-column:span 6}.page-grid .s7{grid-column:span 7}.page-grid .s8{grid-column:span 8}
.env-card-sm{padding:1.4rem 1rem;text-align:center}.env-card-sm .env-val{font-size:1.8rem}
.voice-btn{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));border:2px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;z-index:1000;box-shadow:0 6px 30px rgba(129,140,248,.45),inset 0 1px 0 rgba(255,255,255,.1);transition:all .35s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;overflow:hidden}.voice-btn::before{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);opacity:0;transition:opacity .35s}.voice-btn:hover{transform:scale(1.1);box-shadow:0 8px 40px rgba(129,140,248,.6),inset 0 1px 0 rgba(255,255,255,.15)}.voice-btn:hover::before{opacity:1}.voice-btn:active{transform:scale(.94)}.voice-btn svg{width:26px;height:26px;position:relative;z-index:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2));transition:transform .3s}.voice-btn.listening{animation:voicePulse 1s infinite;background:linear-gradient(135deg,#ef4444,#f97316);border-color:rgba(255,255,255,.2)}.voice-btn.listening svg{animation:micShake .5s infinite}
@keyframes voicePulse{0%,100%{box-shadow:0 6px 30px rgba(239,68,68,.5),0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 6px 44px rgba(239,68,68,.7),0 0 0 18px rgba(239,68,68,0)}}
@keyframes micShake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
.voice-bubble{position:fixed;bottom:100px;right:24px;width:320px;padding:1.2rem;border-radius:16px;background:rgba(22,22,40,.92);backdrop-filter:blur(30px) saturate(1.2);-webkit-backdrop-filter:blur(30px) saturate(1.2);border:1px solid rgba(255,255,255,.1);z-index:999;font-size:.88rem;box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04) inset;transition:all .35s cubic-bezier(.4,0,.2,1)}.voice-bubble::after{content:'';position:absolute;bottom:-8px;right:24px;width:16px;height:16px;background:rgba(22,22,40,.92);border-right:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1);transform:rotate(45deg);clip-path:polygon(100% 0,0 100%,100% 100%)}.voice-bubble .cmd-highlight{color:var(--accent-2);font-weight:700}
</style>
</head>
<body>
<div id="app">
<router-view></router-view>
</div>

<script>
/* ======== API 工具 ======== */
const api = {
  get: (url) => fetch(url).then(r => r.ok ? r.json() : Promise.reject(r)),
  post: (url, data) => fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(r => r.json()),
  put: (url, data) => fetch(url, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(r => r.json()),
  del: (url) => fetch(url, {method:'DELETE'}).then(r => r.json())
};

/* ======== 登录页 ======== */
const LoginPage = {
  template: `
<div class="login-page">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:2rem">
      <div class="logo" style="justify-content:center;padding:0;font-size:2rem">RFID<span>智能安防管控平台</span></div>
      <p style="color:#888;margin-top:.5rem">{{ isLogin ? '欢迎回来' : '创建新账号' }}</p>
    </div>
    <el-form :model="form" label-position="top" v-if="isLogin">
      <el-form-item label="用户名"><el-input v-model="form.username" placeholder="请输入用户名" size="large" /></el-form-item>
      <el-form-item label="密码"><el-input v-model="form.password" type="password" placeholder="请输入密码" show-password size="large" @keyup.enter="login" /></el-form-item>
      <el-button type="primary" size="large" style="width:100%;margin-top:.5rem" @click="login" :loading="loading">登 录</el-button>
      <div style="text-align:center;margin-top:1rem">
        <el-link type="primary" @click="isLogin=false">没有账号？去注册</el-link>
      </div>
      <div style="text-align:center;color:#666;font-size:.75rem;margin-top:1rem">管理员: admin / admin123<br>用户: user / user123</div>
    </el-form>
    <el-form :model="form" label-position="top" v-else>
      <el-form-item label="用户名"><el-input v-model="form.username" placeholder="至少3位" size="large" /></el-form-item>
      <el-form-item label="密码"><el-input v-model="form.password" type="password" placeholder="至少6位" show-password size="large" /></el-form-item>
      <el-form-item label="确认密码"><el-input v-model="form.password2" type="password" placeholder="再次输入密码" show-password size="large" /></el-form-item>
      <el-button type="primary" size="large" style="width:100%;margin-top:.5rem" @click="register" :loading="loading">注 册</el-button>
      <div style="text-align:center;margin-top:1rem">
        <el-link type="primary" @click="isLogin=true">已有账号？去登录</el-link>
      </div>
    </el-form>
  </div>
</div>`,
  data(){return{isLogin:true,loading:false,form:{username:'',password:'',password2:''}}},
  methods:{
    async login(){
      if(!this.form.username||!this.form.password) return ElementPlus.ElMessage.warning('请填写用户名和密码');
      this.loading=true;
      try{
        const r=await api.post('/api/login',{username:this.form.username,password:this.form.password});
        if(r.ok){localStorage.setItem('role',r.role);localStorage.setItem('username',r.username);this.$router.push('/dashboard')}else{ElementPlus.ElMessage.error(r.error)}
      }catch(e){ElementPlus.ElMessage.error('登录失败')}
      this.loading=false;
    },
    async register(){
      if(!this.form.username||!this.form.password) return ElementPlus.ElMessage.warning('请填写完整');
      if(this.form.password!==this.form.password2) return ElementPlus.ElMessage.warning('两次密码不一致');
      this.loading=true;
      try{
        const r=await api.post('/api/register',{username:this.form.username,password:this.form.password});
        if(r.ok){ElementPlus.ElMessage.success('注册成功！');this.isLogin=true}else{ElementPlus.ElMessage.error(r.error)}
      }catch(e){ElementPlus.ElMessage.error('注册失败')}
      this.loading=false;
    }
  }
};

/* ======== 主布局 ======== */
const MainLayout = {
  template: `
<el-container>
  <el-aside width="220px">
    <div class="logo">RFID<span>安防管控</span></div>
    <el-menu :default-active="route" router style="border:none">
      <el-menu-item index="/dashboard"><el-icon><component is="DataAnalysis"/></el-icon><span>仪表盘</span></el-menu-item>
      <el-menu-item index="/monitor"><el-icon><component is="Monitor"/></el-icon><span>实时监控</span></el-menu-item>
      <el-menu-item index="/control"><el-icon><component is="Switch"/></el-icon><span>远程控制</span></el-menu-item>
      <el-menu-item index="/analysis"><el-icon><component is="TrendCharts"/></el-icon><span>数据统计</span></el-menu-item>
      <el-menu-item index="/analysis/smart"><el-icon><component is="Sunny"/></el-icon><span>智能分析</span></el-menu-item>
      <el-menu-item index="/admin/users" v-if="role==='admin'"><el-icon><component is="UserFilled"/></el-icon><span>权限管理</span></el-menu-item>
    </el-menu>
    <div style="position:absolute;bottom:1rem;left:1.2rem">

  data(){return{pageTitle:'仪表盘',role:'',username:'',voiceActive:false,voiceText:'',voiceFeedback:'',showPanel:false,textCmd:"",_rec:null,_panelTimer:null}},

    sendText(){const t=this.textCmd.trim();if(!t)return;this.voiceText=t;this.voiceFeedback='发送中...';fetch('/api/smart_cmd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})}).then(res=>{if(!res.ok)throw new Error(res.status);return res.json()}).then(d=>{this.voiceFeedback=d.reply;if(d.ok&&d.action){ElementPlus.ElMessage.success(d.reply)}else if(d.ok){ElementPlus.ElMessage.info(d.reply)}else{ElementPlus.ElMessage.warning(d.reply)}}).catch(e=>{this.voiceFeedback='失败: '+e.message;ElementPlus.ElMessage.error('命令发送失败')});this.textCmd='';setTimeout(()=>{if(!this.voiceActive)this.voiceText=''},5000)},
  }

/* ======== 智能分析 ======== */
const SmartAnalysis = {
  template: `
<div class="page-grid">
  <!-- ====== 曲线图区 ====== -->
  <div class="page-grid cols-3">
    <div class="glass-card fade-up fade-up-1" style="position:relative"><div style="font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:6px"><span>🌡️ 温度趋势</span><span style="font-size:.8rem;color:var(--accent-2)">{{d.temperature!=null?d.temperature.toFixed(1)+'°C':'--'}}</span></div><div class="chart-box" id="chartTemp" style="height:220px"></div></div>
    <div class="glass-card fade-up fade-up-2" style="position:relative"><div style="font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:6px"><span>💧 湿度趋势</span><span style="font-size:.8rem;color:var(--accent-2)">{{d.humidity!=null?d.humidity.toFixed(1)+'%':'--'}}</span></div><div class="chart-box" id="chartHum"  style="height:220px"></div></div>
    <div class="glass-card fade-up fade-up-3" style="position:relative"><div style="font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:6px"><span>💨 烟雾趋势</span><span style="font-size:.8rem;color:var(--accent-2)">{{d.smoke!=null?d.smoke:'--'}}</span></div><div class="chart-box" id="chartSmoke" style="height:220px"></div></div>
  </div>
  <!-- ====== 火焰 + 摘要 ====== -->
  <div class="page-grid cols-2">
    <div class="env-card env-card-sm" :class="d.fire?'alarm-flash':''"><div class="env-val">{{d.fire?'🔴 有火':'🟢 安全'}}</div><div class="env-lbl">🔥 火焰状态</div></div>
    <div :class="summaryClass" class="summary-bar" v-if="d.summary" style="margin:0">{{d.summary}}</div>
  </div>
  <div style="text-align:center;color:var(--text-muted);font-size:.75rem">📋 分析依据: GB/T 18883-2022 | GB 50736-2012 | GB 50325-2020</div>
  <!-- ====== 分析结论 ====== -->
  <div v-if="!d.insights||!d.insights.length" style="text-align:center;padding:2rem"><el-empty description="暂无传感器数据"/></div>
  <div v-for="ins in (d.insights||[])" :key="ins.title" :class="'insight-card insight-'+ins.level">
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:.4rem">{{{'danger':'🔴','warning':'🟡','info':'🔵','good':'🟢'}[ins.level]}} {{ins.title}}</div>
    <div style="font-size:.9rem;line-height:1.8;color:#ccc;margin-bottom:.6rem">{{ins.detail}}</div>
    <div style="background:rgba(0,0,0,.3);border-radius:8px;padding:.55rem .9rem;font-size:.88rem">💡 <strong>建议:</strong> {{ins.suggestion}}</div>
    <div style="font-size:.75rem;color:#666;margin-top:.4rem">📖 {{ins.reference}}</div>
  </div>
</div>`,
  props:{role:String,username:String},
  data(){return{d:{},timer:null,tHistory:[],hHistory:[],sHistory:[],timeLabels:[]}},
  mounted(){this.$emit('update-title','智能分析');this.refresh();this.timer=setInterval(this.refresh,5000)},
  beforeUnmount(){clearInterval(this.timer);this._disposeCharts()},
  methods:{
    _disposeCharts(){['chartTemp','chartHum','chartSmoke'].forEach(id=>{try{const d=document.getElementById(id);if(d&&d._chart){d._chart.dispose();d._chart=null}}catch(e){}})},
    _initOrUpdateChart(id,data,color,unit){
      const box=document.getElementById(id);if(!box)return;
      if(!box._chart){box._chart=echarts.init(box);}
      const labels=this.timeLabels;
      box._chart.setOption({
        grid:{top:12,right:12,bottom:24,left:48},
        xAxis:{type:'category',data:labels,axisLabel:{color:'#64748b',fontSize:9,rotate:45,interval:Math.max(1,Math.floor(labels.length/6))},axisLine:{lineStyle:{color:'rgba(255,255,255,.08)'}},splitLine:{show:false}},
        yAxis:{type:'value',axisLabel:{color:'#64748b',fontSize:9},axisLine:{show:false},splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}}},
        series:[{data:data,type:'line',smooth:true,showSymbol:false,lineStyle:{color:color,width:2},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:color+'40'},{offset:1,color:color+'05'}])}}],
        animation:true,animationDuration:400
      },true);
    },
    async refresh(){
      try{this.d=await api.get('/api/smart_analysis')}catch(e){return}
      const now=new Date();
      const ts=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
      this.timeLabels.push(ts);if(this.timeLabels.length>120)this.timeLabels.shift();
      this.tHistory.push(this.d.temperature!=null?this.d.temperature:null);if(this.tHistory.length>120)this.tHistory.shift();
      this.hHistory.push(this.d.humidity!=null?this.d.humidity:null);if(this.hHistory.length>120)this.hHistory.shift();
      this.sHistory.push(this.d.smoke!=null?this.d.smoke:null);if(this.sHistory.length>120)this.sHistory.shift();
      this.$nextTick(()=>{
        this._initOrUpdateChart('chartTemp',this.tHistory,'#f97316');
        this._initOrUpdateChart('chartHum', this.hHistory,'#06b6d4');
        this._initOrUpdateChart('chartSmoke',this.sHistory,'#818cf8');
      });
    }
  },
  computed:{
    summaryClass(){
      if(this.d.fire||(this.d.insights||[]).some(i=>i.level==='danger')) return 'summary-danger';
      if((this.d.insights||[]).some(i=>i.level==='warning')) return 'summary-warning';
      return 'summary-good';
    }
  }
};

/* ======== 路由 & 启动 ======== */
const routes=[
  {path:'/',redirect:'/login'},
  {path:'/login',component:LoginPage},
  {path:'/',component:MainLayout,children:[
    {path:'/dashboard',component:Dashboard},
    {path:'/monitor',component:MonitorPage},
    {path:'/control',component:ControlPage},
    {path:'/analysis',component:AnalysisPage},
    {path:'/analysis/smart',component:SmartAnalysis},
    {path:'/admin/users',component:AdminUsers},
  ]}
];

const router=VueRouter.createRouter({history:VueRouter.createWebHashHistory(),routes});

router.beforeEach(async (to,from)=>{
  if(to.path==='/login') return true;
  if(!localStorage.getItem('role')) return '/login';
  return true;
});

const app=Vue.createApp({});
app.use(router);
app.use(ElementPlus);
if(window.ElementPlusIconsVue){for(const[name,comp]of Object.entries(ElementPlusIconsVue)){app.component(name,comp)}}
app.mount('#app');
</script>
