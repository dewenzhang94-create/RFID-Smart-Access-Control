<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>远程控制 | RFID门禁</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --bg: #121212; --card: #1e1e2f; --accent: #6366f1; --nav: #151521; }
        body { background: var(--bg); color: #e0e0e0; }
        .sidebar { background: var(--nav); min-height: 100vh; position: fixed; width: 240px; padding-top: 1.5rem; }
        .sidebar a { color: #aaa; display: block; padding: 0.7rem 1.5rem; text-decoration: none; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background: rgba(99,102,241,.15); border-left-color: var(--accent); }
        .main { margin-left: 240px; padding: 1.5rem; }
        .ctrl-btn { width: 160px; height: 160px; border-radius: 50%; font-size: 1.2rem; border: none; margin: 1rem; transition: all .2s; }
        .ctrl-btn:hover { transform: scale(1.08); }
        .ctrl-btn:active { transform: scale(.95); }
        .btn-unlock { background: #22c55e; color: #fff; }
        .btn-lock { background: #ef4444; color: #fff; }
        .btn-alarm { background: #f59e0b; color: #fff; }
        .btn-sync { background: var(--accent); color: #fff; }
        .log-area { background: #111; border-radius: 8px; padding: 1rem; font-family: monospace; font-size: .85rem; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand" style="font-size:1.4rem; padding:0 1.5rem 1rem; color:#fff;">RFID<span style="color:var(--accent);">门禁</span></div>
    <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i>仪表盘</a>
    <a href="/monitor"><i class="bi bi-display me-2"></i>实时监控</a>
    <a href="/control" class="active"><i class="bi bi-toggle-on me-2"></i>远程控制</a>
    <a href="/analysis"><i class="bi bi-bar-chart me-2"></i>数据分析</a>
    {% if role == 'admin' %}
    <a href="/admin/users"><i class="bi bi-people me-2"></i>权限管理</a>
    {% endif %}
    <hr style="border-color:#2a2a3d; margin:1rem;">
    <a href="/logout"><i class="bi bi-box-arrow-right me-2"></i>退出 ({{ username }})</a>
    <div class="px-3 mt-2"><span class="badge" style="background:var(--accent);">{{ '管理员' if role=='admin' else '普通用户' }}</span></div>
</div>

<div class="main">
    <h4 class="mb-4">🎮 远程控制</h4>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card p-4" style="background:var(--card); border:1px solid #2a2a3d;">
                <h5 class="mb-4 text-center">门锁控制</h5>
                <div class="text-center mb-3">
                    <div class="fs-1" id="door-icon">🔒</div>
                    <small class="text-muted" id="door-status">当前状态: 未知</small>
                </div>
                <div class="d-flex justify-content-center flex-wrap">
                    {% if role == 'admin' %}
                    <button class="ctrl-btn btn-unlock" onclick="sendCmd('unlock')">
                        <i class="bi bi-unlock" style="font-size:3rem;"></i><br>远程开门
                    </button>
                    <button class="ctrl-btn btn-lock" onclick="sendCmd('lock')">
                        <i class="bi bi-lock" style="font-size:3rem;"></i><br>远程锁门
                    </button>
                    {% else %}
                    <div class="alert alert-warning text-center w-100">普通用户无远程开门权限，请联系管理员</div>
                    {% endif %}
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card p-4" style="background:var(--card); border:1px solid #2a2a3d;">
                <h5 class="mb-4 text-center">系统控制</h5>
                <div class="d-flex justify-content-center flex-wrap">
                    <button class="ctrl-btn btn-alarm" onclick="sendCmd('alarm_test')">
                        <i class="bi bi-volume-up" style="font-size:3rem;"></i><br>测试报警
                    </button>
                    <button class="ctrl-btn btn-sync" onclick="sendCmd('reboot')">
                        <i class="bi bi-arrow-repeat" style="font-size:3rem;"></i><br>重启设备
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 操作日志 -->
    <div class="card mt-4" style="background:var(--card); border:1px solid #2a2a3d;">
        <div class="card-header"><strong>操作日志</strong></div>
        <div class="card-body">
            <div class="log-area" id="cmd-log">
                <span class="text-muted">[系统] 等待指令...</span>
            </div>
        </div>
    </div>
</div>

<script>
function log(msg, color) {
    const el = document.getElementById('cmd-log');
    const time = new Date().toLocaleTimeString();
    el.innerHTML += `<br><span style="color:${color||'#aaa'}">[${time}] ${msg}</span>`;
    el.scrollTop = el.scrollHeight;
}

async function sendCmd(cmd) {
    const names = { 'unlock':'远程开门','lock':'远程锁门','alarm_test':'测试报警','reboot':'重启设备' };
    log(`发送: ${names[cmd] || cmd}...`, '#6366f1');
    try {
        const r = await fetch('/api/cmd', {method:'POST',
            headers:{'Content-Type':'application/json'}, body:JSON.stringify({cmd:cmd})});
        const d = await r.json();
        if (d.ok) log(`✅ 成功: ${names[cmd] || cmd}`, '#22c55e');
        else log(`❌ 失败: ${d.error}`, '#ef4444');
    } catch(e) {
        log(`❌ 网络错误: ${e.message}`, '#ef4444');
    }
}

async function refresh() {
    const r = await fetch('/api/live');
    const d = await r.json();
    document.getElementById('door-icon').textContent = d.door_open ? '🔓' : '🔒';
    document.getElementById('door-status').textContent = '当前: ' + (d.door_open ? '门已开' : '已上锁');
    if (!d.online) {
        document.getElementById('door-status').textContent = '⚠️ ESP32 离线';
    }
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
