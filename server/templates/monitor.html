<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="15">
    <title>实时监控 | RFID门禁</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --bg: #121212; --card: #1e1e2f; --accent: #6366f1; --nav: #151521; }
        body { background: var(--bg); color: #e0e0e0; }
        .sidebar { background: var(--nav); min-height: 100vh; position: fixed; width: 240px; padding-top: 1.5rem; }
        .sidebar a { color: #aaa; display: block; padding: 0.7rem 1.5rem; text-decoration: none; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background: rgba(99,102,241,.15); border-left-color: var(--accent); }
        .main { margin-left: 240px; padding: 1.5rem; }
        .env-card { text-align: center; padding: 2rem 1rem; border-radius: 12px; border: 1px solid #2a2a3d; }
        .env-card .val { font-size: 2.5rem; font-weight: 700; }
        .env-card .lbl { color: #888; font-size: .85rem; margin-top: .5rem; }
        .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; animation: pulse 1s infinite; }
        .status-online { background: #22c55e; }
        .status-offline { background: #ef4444; }
        @keyframes pulse { 50% { opacity: .5; } }
        .alarm-flash { animation: flash .5s infinite; } @keyframes flash { 50% { background: rgba(239,68,68,.3); border-color: #ef4444; } }
        .log-item { padding: .5rem 1rem; border-left: 2px solid #2a2a3d; font-size: .9rem; }
        .log-item.alarm { border-left-color: #ef4444; background: rgba(239,68,68,.1); }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand" style="font-size:1.4rem; padding:0 1.5rem 1rem; color:#fff;">RFID<span style="color:var(--accent);">门禁</span></div>
    <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i>仪表盘</a>
    <a href="/monitor" class="active"><i class="bi bi-display me-2"></i>实时监控</a>
    <a href="/control"><i class="bi bi-toggle-on me-2"></i>远程控制</a>
    <a href="/analysis"><i class="bi bi-bar-chart me-2"></i>数据分析</a>
    {% if role == 'admin' %}
    <a href="/admin/users"><i class="bi bi-people me-2"></i>权限管理</a>
    {% endif %}
    <hr style="border-color:#2a2a3d; margin:1rem;">
    <a href="/logout"><i class="bi bi-box-arrow-right me-2"></i>退出 ({{ username }})</a>
    <div class="px-3 mt-2"><span class="badge" style="background:var(--accent);">{{ '管理员' if role=='admin' else '普通用户' }}</span></div>
</div>

<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>📺 实时监控</h4>
        <small class="text-muted">自动刷新中... <span id="clock"></span></small>
    </div>

    <!-- 设备状态 & 环境 -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="env-card" style="background:var(--card);" id="card-status">
                <div class="val"><span class="status-dot status-online" id="dot-status"></span></div>
                <div class="lbl">ESP32 设备状态</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="env-card" style="background:var(--card);">
                <div class="val" id="val-temp">--°C</div>
                <div class="lbl">🌡️ 温度</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="env-card" style="background:var(--card);">
                <div class="val" id="val-hum">--%</div>
                <div class="lbl">💧 湿度</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="env-card" style="background:var(--card);" id="card-smoke">
                <div class="val" id="val-smoke">--</div>
                <div class="lbl">💨 烟雾值</div>
            </div>
        </div>
    </div>

    <!-- 门状态 & 报警 -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="env-card" style="background:var(--card);" id="card-door">
                <div class="val" id="val-door">🔒</div>
                <div class="lbl">门锁状态</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="env-card" style="background:var(--card);" id="card-fire">
                <div class="val" id="val-fire">🟢</div>
                <div class="lbl">🔥 火焰检测</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="env-card" style="background:var(--card);" id="card-alarm">
                <div class="val" id="val-alarm">🟢</div>
                <div class="lbl">🚨 报警状态</div>
            </div>
        </div>
    </div>

    <!-- 实时日志 -->
    <div class="card" style="background:var(--card); border:1px solid #2a2a3d;">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>实时日志</strong>
            <small class="text-muted" id="log-count">0 条</small>
        </div>
        <div id="log-container" style="max-height:400px; overflow-y:auto;">
            <div class="log-item text-muted">等待数据...</div>
        </div>
    </div>
</div>

<script>
let alarmActive = false;

async function refresh() {
    const r = await fetch('/api/live');
    const d = await r.json();

    // 设备状态
    document.getElementById('dot-status').className = d.online ? 'status-dot status-online' : 'status-dot status-offline';

    // 环境数据
    document.getElementById('val-temp').textContent = d.temp != null ? d.temp.toFixed(1) + '°C' : '--°C';
    document.getElementById('val-hum').textContent = d.humidity != null ? d.humidity.toFixed(1) + '%' : '--%';
    document.getElementById('val-smoke').textContent = d.smoke;

    // 火焰
    const fireDiv = document.getElementById('card-fire');
    const valFire = document.getElementById('val-fire');
    if (d.fire) {
        valFire.textContent = '🔴 有火!';
        fireDiv.classList.add('alarm-flash');
    } else {
        valFire.textContent = '🟢';
        fireDiv.classList.remove('alarm-flash');
    }

    // 门状态
    document.getElementById('val-door').textContent = d.door_open ? '🔓 已开' : '🔒 已锁';

    // 报警
    document.getElementById('val-alarm').textContent = d.alarm ? '🔴 ' + d.alarm.event : '🟢 正常';

    // 烟雾报警
    if (d.smoke > 2000) {
        document.getElementById('card-smoke').classList.add('alarm-flash');
    } else {
        document.getElementById('card-smoke').classList.remove('alarm-flash');
    }

    // 日志
    const logs = d.logs || [];
    document.getElementById('log-count').textContent = logs.length + ' 条';
    const container = document.getElementById('log-container');
    container.innerHTML = logs.map(l => {
        let cls = 'log-item';
        if (l.event === 'unauthorized' || l.event === 'illegal_door') cls += ' alarm';
        return `<div class="${cls}"><span class="text-muted">${l.time}</span> | <strong>${l.event}</strong> | ${l.username || l.uid || '-'} | <small class="text-muted">${l.topic}</small></div>`;
    }).join('') || '<div class="log-item text-muted">暂无数据</div>';
}

setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
