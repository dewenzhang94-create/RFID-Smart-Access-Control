<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>仪表盘 | RFID门禁</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --bg: #121212; --card: #1e1e2f; --accent: #6366f1; --nav: #151521; }
        body { background: var(--bg); color: #e0e0e0; }
        .sidebar { background: var(--nav); min-height: 100vh; position: fixed; width: 240px; padding-top: 1.5rem; }
        .sidebar a { color: #aaa; display: block; padding: 0.7rem 1.5rem; text-decoration: none; border-left: 3px solid transparent; transition: all .2s; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background: rgba(99,102,241,.15); border-left-color: var(--accent); }
        .sidebar .brand { font-size: 1.4rem; padding: 0 1.5rem 1rem; color: #fff; }
        .sidebar .brand span { color: var(--accent); }
        .main { margin-left: 240px; padding: 1.5rem; }
        .stat-card { background: var(--card); border-radius: 12px; padding: 1.2rem; border: 1px solid #2a2a3d; }
        .stat-card .value { font-size: 2rem; font-weight: 700; }
        .stat-card .label { color: #888; font-size: .85rem; }
        .table { --bs-table-bg: transparent; --bs-table-color: #e0e0e0; }
        .badge-purple { background: var(--accent); }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand">RFID<span>门禁</span></div>
    <a href="/dashboard" class="active"><i class="bi bi-speedometer2 me-2"></i>仪表盘</a>
    <a href="/monitor"><i class="bi bi-display me-2"></i>实时监控</a>
    <a href="/control"><i class="bi bi-toggle-on me-2"></i>远程控制</a>
    <a href="/analysis"><i class="bi bi-bar-chart me-2"></i>数据分析</a>
    {% if role == 'admin' %}
    <a href="/admin/users"><i class="bi bi-people me-2"></i>权限管理</a>
    {% endif %}
    <hr style="border-color:#2a2a3d; margin:1rem;">
    <a href="/logout"><i class="bi bi-box-arrow-right me-2"></i>退出 ({{ username }})</a>
    <div class="px-3 mt-2"><span class="badge badge-purple">{{ '管理员' if role=='admin' else '普通用户' }}</span></div>
</div>

<div class="main">
    <h4 class="mb-4">📊 系统仪表盘</h4>

    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="stat-card"><div class="value text-primary" id="stat-today">--</div><div class="label">今日通行</div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="value text-success" id="stat-pass">--</div><div class="label">认证通过</div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="value text-danger" id="stat-fail">--</div><div class="label">非法尝试</div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="value text-warning" id="stat-online">--</div><div class="label">设备状态</div></div></div>
    </div>

    <div class="card bg-transparent border-secondary-subtle p-3 mb-4" style="border:1px solid #2a2a3d;">
        <h6 class="mb-3"><i class="bi bi-list-ul me-2"></i>最近通行记录</h6>
        <div class="table-responsive">
            <table class="table table-sm table-borderless">
                <thead><tr class="text-muted"><th>时间</th><th>UID</th><th>用户</th><th>事件</th><th>Topic</th></tr></thead>
                <tbody id="log-table"></tbody>
            </table>
        </div>
    </div>

    {% if role == 'admin' %}
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card bg-transparent p-3" style="border:1px solid #2a2a3d;">
                <h6>快速操作</h6>
                <button class="btn btn-sm btn-primary me-2" onclick="remoteCmd('unlock')"><i class="bi bi-unlock"></i> 远程开门</button>
                <button class="btn btn-sm btn-warning" onclick="remoteCmd('alarm_test')"><i class="bi bi-volume-up"></i> 测试报警</button>
            </div>
        </div>
    </div>
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function refresh() {
    const r = await fetch('/api/stats');
    const s = await r.json();
    document.getElementById('stat-today').textContent = s.today_total;
    document.getElementById('stat-pass').textContent = s.today_pass;
    document.getElementById('stat-fail').textContent = s.today_fail;
}

async function remoteCmd(cmd) {
    const r = await fetch('/api/cmd', {method:'POST',
        headers:{'Content-Type':'application/json'}, body:JSON.stringify({cmd:cmd})});
    const d = await r.json();
    alert(d.ok ? '指令已发送' : ('失败: ' + d.error));
}

async function loadLive() {
    const r = await fetch('/api/live');
    const d = await r.json();
    document.getElementById('stat-online').textContent = d.online ? '在线' : '离线';
    const tb = document.getElementById('log-table');
    tb.innerHTML = (d.logs || []).map(l =>
        `<tr>
            <td class="text-muted">${l.time}</td>
            <td>${l.uid || '-'}</td>
            <td>${l.username || '-'}</td>
            <td>${l.event}</td>
            <td class="text-muted">${l.topic}</td>
        </tr>`
    ).join('') || '<tr><td colspan="5" class="text-muted">暂无数据</td></tr>';
}

refresh(); loadLive();
setInterval(refresh, 3000);
setInterval(loadLive, 2000);
</script>
</body>
</html>
