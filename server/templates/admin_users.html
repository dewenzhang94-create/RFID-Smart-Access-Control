<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>权限管理 | RFID门禁</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --bg: #121212; --card: #1e1e2f; --accent: #6366f1; --nav: #151521; }
        body { background: var(--bg); color: #e0e0e0; }
        .sidebar { background: var(--nav); min-height: 100vh; position: fixed; width: 240px; padding-top: 1.5rem; }
        .sidebar a { color: #aaa; display: block; padding: 0.7rem 1.5rem; text-decoration: none; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background: rgba(99,102,241,.15); border-left-color: var(--accent); }
        .main { margin-left: 240px; padding: 1.5rem; }
        .table { --bs-table-bg: transparent; --bs-table-color: #e0e0e0; border-color: #2a2a3d; }
        .badge-admin { background: var(--accent); }
        .badge-user { background: #22c55e; }
        input, select { background: #2a2a3d !important; border: 1px solid #3a3a4d !important; color: #fff !important; }
        .btn-sm { font-size: .8rem; }
        .nav-tabs .nav-link { color: #aaa; }
        .nav-tabs .nav-link.active { background: var(--card); color: #fff; border-color: #2a2a3d #2a2a3d var(--card); }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand" style="font-size:1.4rem; padding:0 1.5rem 1rem; color:#fff;">RFID<span style="color:var(--accent);">门禁</span></div>
    <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i>仪表盘</a>
    <a href="/monitor"><i class="bi bi-display me-2"></i>实时监控</a>
    <a href="/control"><i class="bi bi-toggle-on me-2"></i>远程控制</a>
    <a href="/analysis"><i class="bi bi-bar-chart me-2"></i>数据分析</a>
    <a href="/admin/users" class="active"><i class="bi bi-people me-2"></i>权限管理</a>
    <hr style="border-color:#2a2a3d; margin:1rem;">
    <a href="/logout"><i class="bi bi-box-arrow-right me-2"></i>退出 ({{ username }})</a>
    <div class="px-3 mt-2"><span class="badge badge-admin">管理员</span></div>
</div>

<div class="main">
    <h4 class="mb-4">🔐 权限管理</h4>

    <ul class="nav nav-tabs mb-3" id="myTab">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-users">系统用户</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-cards">RFID 卡管理</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-add">添加用户</button></li>
    </ul>

    <div class="tab-content">
        <!-- 系统用户 -->
        <div class="tab-pane fade show active" id="tab-users">
            <div class="table-responsive">
                <table class="table table-sm">
                    <thead><tr class="text-muted"><th>ID</th><th>用户名</th><th>角色</th><th>创建时间</th><th>操作</th></tr></thead>
                    <tbody id="user-table"></tbody>
                </table>
            </div>
        </div>

        <!-- RFID 卡 -->
        <div class="tab-pane fade" id="tab-cards">
            <div class="d-flex mb-3">
                <input id="card-uid" class="form-control form-control-sm me-2" placeholder="UID (十六进制)" style="width:180px;">
                <input id="card-name" class="form-control form-control-sm me-2" placeholder="用户名" style="width:150px;">
                <button class="btn btn-sm btn-primary" onclick="addCard()">添加卡</button>
            </div>
            <div class="table-responsive">
                <table class="table table-sm">
                    <thead><tr class="text-muted"><th>UID</th><th>用户名</th><th>角色</th><th>操作</th></tr></thead>
                    <tbody id="card-table"></tbody>
                </table>
            </div>
        </div>

        <!-- 添加用户 -->
        <div class="tab-pane fade" id="tab-add">
            <div class="col-md-4">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input id="add-user" class="form-control" placeholder="至少3位">
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input id="add-pw" class="form-control" type="password" placeholder="至少6位">
                </div>
                <div class="mb-3">
                    <label class="form-label">角色</label>
                    <select id="add-role" class="form-control">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="addUser()">添加用户</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadUsers() {
    const r = await fetch('/api/admin/users');
    const users = await r.json();
    document.getElementById('user-table').innerHTML = users.map(u =>
        `<tr>
            <td>${u.id}</td><td>${u.username}</td>
            <td><span class="badge ${u.role==='admin'?'badge-admin':'badge-user'}">${u.role}</span></td>
            <td class="text-muted">${u.created}</td>
            <td>
                ${u.role !== 'admin' ? `<button class="btn btn-sm btn-outline-primary" onclick="changeRole(${u.id},'admin')">升管理员</button>` :
                                       `<button class="btn btn-sm btn-outline-warning" onclick="changeRole(${u.id},'user')">降用户</button>`}
                <button class="btn btn-sm btn-outline-danger" onclick="delUser(${u.id})">删除</button>
            </td>
        </tr>`
    ).join('');
}

async function loadCards() {
    const r = await fetch('/api/admin/cards');
    const cards = await r.json();
    document.getElementById('card-table').innerHTML = cards.map(c =>
        `<tr>
            <td>${c.uid}</td><td>${c.username}</td><td>${c.role}</td>
            <td><button class="btn btn-sm btn-outline-danger" onclick="delCard('${c.uid}')">删除</button></td>
        </tr>`
    ).join('');
}

async function addUser() {
    const u = document.getElementById('add-user').value.trim();
    const p = document.getElementById('add-pw').value.trim();
    const role = document.getElementById('add-role').value;
    if (!u || !p) return alert('请填写完整');
    const r = await fetch('/api/admin/user', {method:'POST',
        headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p, role})});
    const d = await r.json();
    alert(d.ok ? '添加成功' : ('错误: ' + d.error));
    if (d.ok) loadUsers();
}

async function delUser(id) {
    if (!confirm('确定删除此用户?')) return;
    const r = await fetch('/api/admin/user/' + id, {method:'DELETE'});
    const d = await r.json();
    alert(d.ok ? '已删除' : ('错误: ' + d.error));
    if (d.ok) loadUsers();
}

async function changeRole(id, role) {
    const r = await fetch('/api/admin/user/' + id + '/role', {method:'PUT',
        headers:{'Content-Type':'application/json'}, body:JSON.stringify({role})});
    const d = await r.json();
    if (d.ok) loadUsers();
    else alert(d.error);
}

async function addCard() {
    const uid = document.getElementById('card-uid').value.trim().toUpperCase();
    const name = document.getElementById('card-name').value.trim();
    if (!uid || !name) return alert('请输入UID和用户名');
    const r = await fetch('/api/admin/card', {method:'POST',
        headers:{'Content-Type':'application/json'}, body:JSON.stringify({uid, username:name})});
    const d = await r.json();
    alert(d.ok ? '添加成功' : ('错误: ' + d.error));
    if (d.ok) loadCards();
}

async function delCard(uid) {
    if (!confirm('确定删除此卡?')) return;
    const r = await fetch('/api/admin/card/' + uid, {method:'DELETE'});
    const d = await r.json();
    alert(d.ok ? '已删除' : ('错误: ' + d.error));
    if (d.ok) loadCards();
}

loadUsers();
loadCards();
</script>
</body>
</html>
