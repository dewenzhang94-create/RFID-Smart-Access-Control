<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据分析 | RFID门禁</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --bg: #121212; --card: #1e1e2f; --accent: #6366f1; --nav: #151521; }
        body { background: var(--bg); color: #e0e0e0; }
        .sidebar { background: var(--nav); min-height: 100vh; position: fixed; width: 240px; padding-top: 1.5rem; }
        .sidebar a { color: #aaa; display: block; padding: 0.7rem 1.5rem; text-decoration: none; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background: rgba(99,102,241,.15); border-left-color: var(--accent); }
        .main { margin-left: 240px; padding: 1.5rem; }
        .chart-box { background: var(--card); border-radius: 12px; padding: 1.2rem; border: 1px solid #2a2a3d; }
        .stat-num { font-size: 2.5rem; font-weight: 800; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand" style="font-size:1.4rem; padding:0 1.5rem 1rem; color:#fff;">RFID<span style="color:var(--accent);">门禁</span></div>
    <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i>仪表盘</a>
    <a href="/monitor"><i class="bi bi-display me-2"></i>实时监控</a>
    <a href="/control"><i class="bi bi-toggle-on me-2"></i>远程控制</a>
    <a href="/analysis" class="active"><i class="bi bi-bar-chart me-2"></i>数据统计</a>
    <a href="/analysis/smart"><i class="bi bi-lightbulb me-2"></i>智能分析</a>
    {% if role == 'admin' %}
    <a href="/admin/users"><i class="bi bi-people me-2"></i>权限管理</a>
    {% endif %}
    <hr style="border-color:#2a2a3d; margin:1rem;">
    <a href="/logout"><i class="bi bi-box-arrow-right me-2"></i>退出 ({{ username }})</a>
    <div class="px-3 mt-2"><span class="badge" style="background:var(--accent);">{{ '管理员' if role=='admin' else '普通用户' }}</span></div>
</div>

<div class="main">
    <h4 class="mb-4">📈 数据分析</h4>

    <!-- 概览卡片 -->
    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="chart-box text-center"><div class="stat-num text-primary" id="ana-total">-</div>总记录数</div></div>
        <div class="col-md-3"><div class="chart-box text-center"><div class="stat-num text-success" id="ana-today">-</div>今日通行</div></div>
        <div class="col-md-3"><div class="chart-box text-center"><div class="stat-num text-danger" id="ana-alarm">-</div>报警次数</div></div>
        <div class="col-md-3"><div class="chart-box text-center"><div class="stat-num text-warning" id="ana-users">-</div>授权用户</div></div>
    </div>

    <div class="row g-3 mb-4">
        <!-- 7日趋势 -->
        <div class="col-md-8">
            <div class="chart-box">
                <h6>📅 最近 7 天通行趋势</h6>
                <canvas id="chartDaily" height="220"></canvas>
            </div>
        </div>
        <!-- 事件分布 -->
        <div class="col-md-4">
            <div class="chart-box">
                <h6>📊 事件类型分布</h6>
                <canvas id="chartPie" height="220"></canvas>
            </div>
        </div>
    </div>

    <!-- 用户排行 -->
    <div class="row g-3">
        <div class="col-md-6">
            <div class="chart-box">
                <h6>👤 通行用户 Top 10</h6>
                <canvas id="chartUsers" height="200"></canvas>
            </div>
        </div>
        <!-- 日志搜索 -->
        <div class="col-md-6">
            <div class="chart-box">
                <h6>🔍 日志查询</h6>
                <div class="row g-2 mb-2">
                    <div class="col-4"><input id="q-event" class="form-control form-control-sm" placeholder="事件" style="background:#2a2a3d;border-color:#3a3a4d;color:#fff;"></div>
                    <div class="col-4"><input id="q-user" class="form-control form-control-sm" placeholder="用户名" style="background:#2a2a3d;border-color:#3a3a4d;color:#fff;"></div>
                    <div class="col-4"><button class="btn btn-sm btn-primary w-100" onclick="searchLogs()">搜索</button></div>
                </div>
                <div style="max-height:250px;overflow-y:auto;" id="search-result">
                    <small class="text-muted">输入条件后点击搜索</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let chartDaily, chartPie, chartUsers;

async function load() {
    const r = await fetch('/api/stats');
    const s = await r.json();

    document.getElementById('ana-total').textContent = s.total;
    document.getElementById('ana-today').textContent = s.today_total;
    document.getElementById('ana-alarm').textContent = s.total_alarm;
    document.getElementById('ana-users').textContent = s.users.length;

    // 7日趋势
    const labels = s.daily.map(d => d.date);
    const values = s.daily.map(d => d.count);
    if (chartDaily) chartDaily.destroy();
    chartDaily = new Chart(document.getElementById('chartDaily'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '通行次数', data: values,
                borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,.1)',
                fill: true, tension: .3, pointBackgroundColor: '#6366f1'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#aaa' } } },
            scales: {
                x: { ticks: { color: '#888' }, grid: { color: '#2a2a3d' } },
                y: { ticks: { color: '#888' }, grid: { color: '#2a2a3d' }, beginAtZero: true }
            }
        }
    });

    // 事件分布
    const eventLabels = s.events.map(e => e.event);
    const eventValues = s.events.map(e => e.count);
    if (chartPie) chartPie.destroy();
    chartPie = new Chart(document.getElementById('chartPie'), {
        type: 'doughnut',
        data: {
            labels: eventLabels,
            datasets: [{
                data: eventValues,
                backgroundColor: ['#6366f1','#22c55e','#ef4444','#f59e0b','#06b6d4','#ec4899']
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom', labels: { color: '#aaa' } } }
        }
    });

    // 用户排行
    const userLabels = s.users.map(u => u.name);
    const userValues = s.users.map(u => u.count);
    if (chartUsers) chartUsers.destroy();
    chartUsers = new Chart(document.getElementById('chartUsers'), {
        type: 'bar',
        data: {
            labels: userLabels,
            datasets: [{
                label: '通行次数', data: userValues,
                backgroundColor: '#6366f1', borderRadius: 6, barThickness: 30
            }]
        },
        options: {
            responsive: true, indexAxis: 'y',
            plugins: { legend: { labels: { color: '#aaa' } } },
            scales: {
                x: { ticks: { color: '#888' }, grid: { color: '#2a2a3d' }, beginAtZero: true },
                y: { ticks: { color: '#888' }, grid: { display: false } }
            }
        }
    });
}

async function searchLogs() {
    const event = document.getElementById('q-event').value;
    const username = document.getElementById('q-user').value;
    const params = new URLSearchParams({event, username, per_page: 20});
    const r = await fetch('/api/logs?' + params);
    const d = await r.json();
    const el = document.getElementById('search-result');
    if (!d.logs.length) { el.innerHTML = '<small class="text-muted">无结果</small>'; return; }
    el.innerHTML = d.logs.map(l =>
        `<div style="padding:.3rem 0;border-bottom:1px solid #2a2a3d;font-size:.85rem;">
            <span class="text-muted">${l.access_time}</span> |
            ${l.event} | ${l.username || l.uid}
        </div>`
    ).join('');
}

load();
</script>
</body>
</html>
